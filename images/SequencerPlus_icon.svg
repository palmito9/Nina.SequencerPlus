<svg xmlns="http://www.w3.org/2000/svg" width="916" height="916" viewBox="0 0 916 916">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#080d1a"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4a90d9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4a90d9" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="roundClip">
      <rect width="916" height="916" rx="180" ry="180"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundClip)">
    <rect width="916" height="916" fill="url(#bgGrad)"/>
    <rect width="916" height="916" fill="url(#glowCenter)"/>

    <circle cx="120" cy="95"  r="1.5" fill="white" opacity="0.9"/>
    <circle cx="203" cy="180" r="1"   fill="white" opacity="0.6"/>
    <circle cx="340" cy="70"  r="2"   fill="white" opacity="0.8"/>
    <circle cx="480" cy="110" r="1"   fill="white" opacity="0.5"/>
    <circle cx="600" cy="55"  r="1.5" fill="white" opacity="0.9"/>
    <circle cx="710" cy="140" r="1"   fill="white" opacity="0.6"/>
    <circle cx="800" cy="80"  r="2"   fill="white" opacity="0.7"/>
    <circle cx="860" cy="200" r="1"   fill="white" opacity="0.5"/>
    <circle cx="75"  cy="280" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="155" cy="380" r="1"   fill="white" opacity="0.5"/>
    <circle cx="820" cy="310" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="880" cy="420" r="1"   fill="white" opacity="0.6"/>
    <circle cx="90"  cy="500" r="2"   fill="white" opacity="0.6"/>
    <circle cx="830" cy="550" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="100" cy="700" r="1"   fill="white" opacity="0.5"/>
    <circle cx="180" cy="790" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="280" cy="840" r="1"   fill="white" opacity="0.5"/>
    <circle cx="700" cy="820" r="2"   fill="white" opacity="0.7"/>
    <circle cx="810" cy="760" r="1"   fill="white" opacity="0.6"/>
    <circle cx="870" cy="680" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="420" cy="830" r="1"   fill="white" opacity="0.5"/>
    <circle cx="550" cy="870" r="1.5" fill="white" opacity="0.7"/>

    <circle cx="240" cy="195" r="2.5" fill="white" opacity="0.95" filter="url(#starGlow)"/>
    <circle cx="670" cy="165" r="3"   fill="white" opacity="0.95" filter="url(#starGlow)"/>
    <circle cx="760" cy="720" r="2.5" fill="white" opacity="0.9"  filter="url(#starGlow)"/>
    <circle cx="150" cy="640" r="2"   fill="white" opacity="0.9"  filter="url(#starGlow)"/>

    <line x1="240" y1="195" x2="670" y2="165" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <line x1="670" y1="165" x2="760" y2="720" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <line x1="240" y1="195" x2="150" y2="640" stroke="white" stroke-width="0.5" opacity="0.15"/>

    <g filter="url(#softGlow)">
      <line x1="210" y1="370" x2="706" y2="370" stroke="#4a90d9" stroke-width="3" opacity="0.5" stroke-dasharray="8,6"/>
      <line x1="210" y1="458" x2="706" y2="458" stroke="#4a90d9" stroke-width="3" opacity="0.5" stroke-dasharray="8,6"/>
      <line x1="210" y1="546" x2="706" y2="546" stroke="#4a90d9" stroke-width="3" opacity="0.5" stroke-dasharray="8,6"/>

      <rect x="210" y="340" width="100" height="60" rx="10" fill="#4a90d9" opacity="0.9"/>
      <rect x="390" y="340" width="100" height="60" rx="10" fill="#4a90d9" opacity="0.9"/>
      <rect x="570" y="340" width="100" height="60" rx="10" fill="#2ecc8a" opacity="0.9"/>

      <rect x="300" y="428" width="100" height="60" rx="10" fill="#4a90d9" opacity="0.9"/>
      <rect x="480" y="428" width="100" height="60" rx="10" fill="#4a90d9" opacity="0.9"/>

      <rect x="210" y="516" width="100" height="60" rx="10" fill="#2ecc8a" opacity="0.9"/>
      <rect x="390" y="516" width="100" height="60" rx="10" fill="#4a90d9" opacity="0.9"/>
      <rect x="570" y="516" width="100" height="60" rx="10" fill="#4a90d9" opacity="0.9"/>
    </g>

    <text x="458" y="260"
          font-family="system-ui, -apple-system, sans-serif"
          font-size="108"
          font-weight="700"
          text-anchor="middle"
          fill="white"
          opacity="0.97"
          filter="url(#softGlow)">Seq+</text>

    <text x="458" y="680"
          font-family="system-ui, -apple-system, sans-serif"
          font-size="44"
          font-weight="400"
          text-anchor="middle"
          fill="#4a90d9"
          opacity="0.9"
          letter-spacing="8">NINA PLUGIN</text>

    <rect x="0" y="0" width="916" height="916" rx="180" ry="180"
          fill="none" stroke="#4a90d9" stroke-width="6" opacity="0.3"/>
  </g>
</svg>
